<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>

    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0c0a30"/>
      <stop offset="55%" stop-color="#050420"/>
      <stop offset="100%" stop-color="#00000a"/>
    </radialGradient>
    <radialGradient id="nebulaM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc33ff" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#cc33ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0099ff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#0099ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0099ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="engineGlow" cx="50%" cy="15%" r="85%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.93"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.73"/>
      <stop offset="65%" stop-color="#cc33ff" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#00e5ff"/>
      <stop offset="75%" stop-color="#cc33ff" stop-opacity="0.67"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#3377ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7df4ff" stop-opacity="0.53"/>
      <stop offset="40%" stop-color="#0b0b30"/>
      <stop offset="78%" stop-color="#1a0b38"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0.27"/>
    </linearGradient>
    <linearGradient id="wingL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.87"/>
      <stop offset="55%" stop-color="#0b1040" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0.27"/>
    </linearGradient>
    <linearGradient id="wingR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.87"/>
      <stop offset="55%" stop-color="#0b1040" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc33ff" stop-opacity="0.27"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="70%" stop-color="#bff7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="ringSweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#cc33ff"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="120" cy="120" rx="150" ry="110" fill="url(#nebulaM)" filter="url(#soft)"/>
  <ellipse cx="408" cy="170" rx="130" ry="100" fill="url(#nebulaC)" filter="url(#soft)"/>
  <ellipse cx="390" cy="420" rx="140" ry="90"  fill="url(#nebulaM)" filter="url(#soft)" opacity="0.7"/>

  <!-- Starfield -->
  <g fill="#ffffff">
    <circle cx="68"  cy="84"  r="2.4" opacity="0.9"/>
    <circle cx="150" cy="52"  r="1.5" opacity="0.7"/>
    <circle cx="262" cy="38"  r="2"   opacity="0.85"/>
    <circle cx="368" cy="64"  r="1.4" opacity="0.6"/>
    <circle cx="448" cy="108" r="2.2" opacity="0.9"/>
    <circle cx="42"  cy="220" r="1.6" opacity="0.65"/>
    <circle cx="470" cy="248" r="1.8" opacity="0.75"/>
    <circle cx="56"  cy="356" r="2"   opacity="0.8"/>
    <circle cx="100" cy="452" r="1.5" opacity="0.6"/>
    <circle cx="440" cy="392" r="1.6" opacity="0.7"/>
    <circle cx="396" cy="300" r="1.3" opacity="0.55"/>
    <circle cx="120" cy="160" r="1.2" opacity="0.5"/>
  </g>
  <!-- Twinkle crosses -->
  <g stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.85" filter="url(#glow3)">
    <path d="M 96,300 v-14 m 0,14 v14 m 0,-14 h-14 m 14,0 h14" opacity="0.8"/>
    <path d="M 430,150 v-10 m 0,10 v10 m 0,-10 h-10 m 10,0 h10" opacity="0.7"/>
  </g>

  <!-- Subtle tech grid -->
  <g opacity="0.06" stroke="#00e5ff" stroke-width="1" fill="none">
    <line x1="171" y1="0" x2="171" y2="512"/>
    <line x1="341" y1="0" x2="341" y2="512"/>
    <line x1="0" y1="171" x2="512" y2="171"/>
    <line x1="0" y1="341" x2="512" y2="341"/>
  </g>

  <!-- Decorative orbital rings -->
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#ringSweep)" stroke-width="2.5" opacity="0.35" stroke-dasharray="40 14 8 14"/>
  <circle cx="256" cy="256" r="216" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.16"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#cc33ff" stroke-width="1" opacity="0.14" stroke-dasharray="3 9"/>
  <!-- Orbital nodes -->
  <g filter="url(#glow3)">
    <circle cx="256" cy="22"  r="4.5" fill="#00e5ff"/>
    <circle cx="490" cy="256" r="4.5" fill="#cc33ff"/>
    <circle cx="22"  cy="256" r="4.5" fill="#ffaa00"/>
  </g>

  <!-- Speed streaks racing past the ship -->
  <g stroke-linecap="round" filter="url(#glow3)">
    <line x1="120" y1="120" x2="120" y2="208" stroke="#00e5ff" stroke-width="4" opacity="0.5"/>
    <line x1="392" y1="104" x2="392" y2="186" stroke="#cc33ff" stroke-width="4" opacity="0.45"/>
    <line x1="86"  y1="262" x2="86"  y2="320" stroke="#00e5ff" stroke-width="3" opacity="0.35"/>
    <line x1="426" y1="248" x2="426" y2="312" stroke="#ffaa00" stroke-width="3" opacity="0.35"/>
    <line x1="156" y1="64"  x2="156" y2="112" stroke="#ffffff" stroke-width="2.5" opacity="0.4"/>
    <line x1="356" y1="330" x2="356" y2="396" stroke="#00e5ff" stroke-width="2.5" opacity="0.3"/>
  </g>

  <!-- Engine exhaust: layered plume -->
  <ellipse cx="256" cy="438" rx="64" ry="38" fill="url(#engineGlow)" filter="url(#glow)"/>
  <path d="M 232,408 C 240,452 248,478 256,496 C 264,478 272,452 280,408 Z" fill="url(#flame)" filter="url(#glow2)" opacity="0.95"/>
  <path d="M 200,396 C 206,428 211,446 217,460 C 223,446 228,428 234,396 Z" fill="url(#flame)" filter="url(#glow2)" opacity="0.8"/>
  <path d="M 278,396 C 284,428 289,446 295,460 C 301,446 306,428 312,396 Z" fill="url(#flame)" filter="url(#glow2)" opacity="0.8"/>

  <!-- ══ SHIP ══ -->
  <!-- Rear canard fins (gold) -->
  <path d="M 232,360 L 158,432 L 196,438 L 240,392 Z" fill="url(#goldEdge)" opacity="0.85" filter="url(#glow3)"/>
  <path d="M 280,360 L 354,432 L 316,438 L 272,392 Z" fill="url(#goldEdge)" opacity="0.85" filter="url(#glow3)"/>

  <!-- Left wing -->
  <path d="M 244,226 L 76,376 L 100,414 L 168,388 L 244,310 Z"
        fill="url(#wingL)" stroke="#00e5ff" stroke-width="2.5" opacity="0.92"/>
  <!-- Gold leading edge L -->
  <path d="M 244,226 L 76,376 L 90,384 L 246,242 Z" fill="url(#goldEdge)" opacity="0.9" filter="url(#glow3)"/>
  <line x1="130" y1="384" x2="232" y2="288" stroke="#00e5ff" stroke-width="1.8" opacity="0.45"/>
  <line x1="150" y1="396" x2="238" y2="312" stroke="#cc33ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Right wing -->
  <path d="M 268,226 L 436,376 L 412,414 L 344,388 L 268,310 Z"
        fill="url(#wingR)" stroke="#00e5ff" stroke-width="2.5" opacity="0.92"/>
  <!-- Gold leading edge R -->
  <path d="M 268,226 L 436,376 L 422,384 L 266,242 Z" fill="url(#goldEdge)" opacity="0.9" filter="url(#glow3)"/>
  <line x1="382" y1="384" x2="280" y2="288" stroke="#00e5ff" stroke-width="1.8" opacity="0.45"/>
  <line x1="362" y1="396" x2="274" y2="312" stroke="#cc33ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Wingtip cannons -->
  <g filter="url(#glow3)">
    <rect x="88"  y="362" width="9" height="34" rx="4" fill="#00e5ff" opacity="0.9" transform="rotate(-42 92 379)"/>
    <rect x="415" y="362" width="9" height="34" rx="4" fill="#00e5ff" opacity="0.9" transform="rotate(42 420 379)"/>
  </g>

  <!-- Forward canards near nose -->
  <path d="M 246,168 L 190,212 L 204,228 L 246,200 Z" fill="url(#wingL)" stroke="#00e5ff" stroke-width="2" opacity="0.85"/>
  <path d="M 266,168 L 322,212 L 308,228 L 266,200 Z" fill="url(#wingR)" stroke="#00e5ff" stroke-width="2" opacity="0.85"/>

  <!-- Fuselage body -->
  <path d="M 256,78 L 282,150 L 298,212 L 302,400 L 256,438 L 210,400 L 214,212 L 230,150 Z"
        fill="url(#bodyGrad)" stroke="#00e5ff" stroke-width="3"/>
  <!-- Magenta inner trim -->
  <path d="M 256,96 L 276,156 L 290,214 L 293,392 L 256,422 L 219,392 L 222,214 L 236,156 Z"
        fill="none" stroke="#cc33ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Fuselage details -->
  <line x1="256" y1="100" x2="256" y2="418" stroke="#00e5ff" stroke-width="1.5" opacity="0.25"/>
  <line x1="240" y1="232" x2="272" y2="232" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="238" y1="330" x2="274" y2="330" stroke="#cc33ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="240" y1="364" x2="272" y2="364" stroke="#ffaa00" stroke-width="1.5" opacity="0.4"/>

  <!-- Nose cockpit -->
  <ellipse cx="256" cy="130" rx="19" ry="35" fill="#7df4ff" opacity="0.5" filter="url(#glow2)"/>
  <ellipse cx="256" cy="120" rx="10" ry="20" fill="#ffffff" opacity="0.75" filter="url(#glow3)"/>
  <circle cx="256" cy="92" r="10" fill="#00e5ff" opacity="0.95" filter="url(#glow2)"/>

  <!-- 3-blade turbine -->
  <g transform="translate(256,278)" filter="url(#glow2)">
    <path d="M 0,0 C 10,-22 14,-52 5,-78 C -5,-52 -10,-22 0,0 Z" fill="url(#bladeGrad)" opacity="0.95"/>
    <path d="M 0,0 C 10,-22 14,-52 5,-78 C -5,-52 -10,-22 0,0 Z" transform="rotate(120)" fill="url(#bladeGrad)" opacity="0.95"/>
    <path d="M 0,0 C 10,-22 14,-52 5,-78 C -5,-52 -10,-22 0,0 Z" transform="rotate(240)" fill="url(#bladeGrad)" opacity="0.95"/>
  </g>

  <!-- Arc-reactor core rings -->
  <circle cx="256" cy="278" r="58" fill="none" stroke="url(#ringSweep)" stroke-width="2.5" opacity="0.6" stroke-dasharray="22 10" filter="url(#glow3)"/>
  <circle cx="256" cy="278" r="46" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 8"/>

  <!-- Core energy burst -->
  <circle cx="256" cy="278" r="42" fill="url(#coreGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="278" r="15" fill="#ffffff" opacity="0.98" filter="url(#glow3)"/>
  <circle cx="256" cy="278" r="6"  fill="#ffffff"/>
  <!-- Core cross flare -->
  <g stroke-linecap="round" filter="url(#glow3)" opacity="0.9">
    <line x1="256" y1="222" x2="256" y2="334" stroke="#ffffff" stroke-width="2.2" opacity="0.55"/>
    <line x1="200" y1="278" x2="312" y2="278" stroke="#ffffff" stroke-width="2.2" opacity="0.55"/>
  </g>

  <!-- Wingtip lens flares -->
  <g filter="url(#glow2)">
    <circle cx="84"  cy="394" r="7" fill="#ffaa00" opacity="0.95"/>
    <circle cx="428" cy="394" r="7" fill="#ffaa00" opacity="0.95"/>
  </g>
  <g stroke="#ffe9b0" stroke-width="2" stroke-linecap="round" opacity="0.8" filter="url(#glow3)">
    <path d="M 84,394 v-18 m 0,18 v18 m 0,-18 h-18 m 18,0 h18"/>
    <path d="M 428,394 v-18 m 0,18 v18 m 0,-18 h-18 m 18,0 h18"/>
  </g>
  <!-- Nose flare -->
  <g stroke="#dffaff" stroke-width="2.4" stroke-linecap="round" opacity="0.9" filter="url(#glow3)">
    <path d="M 256,78 v-26 m 0,26 v14 m 0,-14 h-20 m 20,0 h20"/>
  </g>

  <!-- Outer frame: double glow border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="url(#ringSweep)" stroke-width="5" opacity="0.5"/>
  <rect x="7" y="7" width="498" height="498" rx="90" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
</svg>
